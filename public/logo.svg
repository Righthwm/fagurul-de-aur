<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- Hexagon outer -->
  <polygon points="60,4 106,29 106,79 60,104 14,79 14,29" stroke="#D4A017" stroke-width="2" fill="none"/>
  <!-- Hexagon inner glow -->
  <polygon points="60,12 98,34 98,74 60,96 22,74 22,34" stroke="#D4A017" stroke-width="0.5" fill="rgba(212,160,23,0.04)" opacity="0.6"/>

  <!-- Bee body -->
  <ellipse cx="60" cy="54" rx="10" ry="7" fill="#D4A017"/>
  <!-- Bee stripes -->
  <ellipse cx="60" cy="54" rx="10" ry="7" fill="url(#beeStripes)"/>
  <!-- Bee head -->
  <circle cx="60" cy="44" r="4.5" fill="#D4A017"/>
  <!-- Antennae -->
  <line x1="58" y1="40" x2="54" y2="34" stroke="#D4A017" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="62" y1="40" x2="66" y2="34" stroke="#D4A017" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="54" cy="34" r="1" fill="#D4A017"/>
  <circle cx="66" cy="34" r="1" fill="#D4A017"/>
  <!-- Wings left -->
  <ellipse cx="46" cy="50" rx="9" ry="5" fill="#D4A017" fill-opacity="0.35" transform="rotate(-15 46 50)"/>
  <ellipse cx="47" cy="57" rx="7" ry="3.5" fill="#D4A017" fill-opacity="0.25" transform="rotate(-10 47 57)"/>
  <!-- Wings right -->
  <ellipse cx="74" cy="50" rx="9" ry="5" fill="#D4A017" fill-opacity="0.35" transform="rotate(15 74 50)"/>
  <ellipse cx="73" cy="57" rx="7" ry="3.5" fill="#D4A017" fill-opacity="0.25" transform="rotate(10 73 57)"/>
  <!-- Stinger -->
  <path d="M60 61 L58 67 L60 65 L62 67 Z" fill="#A67C00"/>

  <!-- Stripe pattern definition -->
  <defs>
    <pattern id="beeStripes" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(0)">
      <rect width="2" height="4" fill="rgba(0,0,0,0.3)"/>
    </pattern>
  </defs>

  <!-- Brand name -->
  <text x="60" y="118" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="11" font-weight="400" letter-spacing="4" fill="#D4A017">STUPUL BIO</text>
  <!-- Tagline -->
  <text x="60" y="130" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="6.5" font-weight="400" letter-spacing="1.5" fill="#7A6A50">MIERE NATURALĂ PURĂ</text>
</svg>
